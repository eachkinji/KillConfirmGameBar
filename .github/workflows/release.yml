name: Build release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Install UWP build tools
        shell: pwsh
        run: |
          $installer = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vs_installer.exe"
          $installPath = "C:\Program Files\Microsoft Visual Studio\2022\Enterprise"
          & $installer modify `
            --installPath $installPath `
            --add Microsoft.VisualStudio.Workload.UniversalBuildTools `
            --add Microsoft.VisualStudio.Component.UWP.BuildTools `
            --add Microsoft.VisualStudio.Component.Windows10SDK.22621 `
            --quiet --norestart --nocache --wait

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: .\Build-Installer.ps1

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: KillConfirmGameBar-Setup
          path: Output\KillConfirmGameBar_Setup_*.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Output\KillConfirmGameBar_Setup_*.exe
          generate_release_notes: true
