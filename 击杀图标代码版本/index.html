<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CF 2Kill Compare</title>
  <style>
    :root {
      --bg-1: #0c1321;
      --bg-2: #18253a;
      --panel: rgba(8, 12, 20, 0.88);
      --line: rgba(255, 255, 255, 0.12);
      --text: #eff3ff;
      --muted: #9aa7c0;
      --accent: #ffb347;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at top, rgba(255, 179, 71, 0.14), transparent 28%),
        linear-gradient(180deg, var(--bg-1), var(--bg-2));
    }

    .app {
      width: min(100%, 1500px);
      margin: 0 auto;
      padding: 24px;
      display: grid;
      gap: 18px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      backdrop-filter: blur(10px);
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.28);
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: center;
      justify-content: space-between;
      padding: 16px 18px;
    }

    .meta {
      display: grid;
      gap: 4px;
    }

    .meta strong {
      font-size: 16px;
      font-weight: 700;
    }

    .meta span,
    .notes {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .actions,
    .speed {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 10px 16px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease;
    }

    button:hover { transform: translateY(-1px); }

    .primary {
      background: linear-gradient(180deg, #ffc45a, #ff9f1c);
      color: #1d1300;
    }

    .ghost {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      border: 1px solid rgba(255, 255, 255, 0.14);
    }

    input[type="range"] {
      width: 170px;
    }

    .compare {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 18px;
      padding: 18px;
    }

    .stages {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    .stage-card {
      padding: 14px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      display: grid;
      gap: 10px;
    }

    .stage-title {
      font-size: 14px;
      font-weight: 700;
    }

    .stage-desc {
      color: var(--muted);
      font-size: 12px;
    }

    .stage {
      position: relative;
      height: min(64vh, 680px);
      min-height: 420px;
      overflow: hidden;
      border-radius: 14px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0)),
        radial-gradient(circle at 50% 30%, rgba(255, 164, 44, 0.12), transparent 30%),
        linear-gradient(180deg, #213149 0%, #121d2d 100%);
    }

    .crosshair {
      position: absolute;
      inset: 0;
      opacity: 0.12;
      pointer-events: none;
      background:
        linear-gradient(transparent calc(50% - 1px), rgba(255,255,255,0.75) calc(50% - 1px), rgba(255,255,255,0.75) calc(50% + 1px), transparent calc(50% + 1px)),
        linear-gradient(90deg, transparent calc(50% - 1px), rgba(255,255,255,0.75) calc(50% - 1px), rgba(255,255,255,0.75) calc(50% + 1px), transparent calc(50% + 1px));
    }

    .canvas-wrap,
    .sim-wrap {
      position: absolute;
      left: 50%;
      top: 52%;
      width: 607px;
      height: 436px;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .sim-anchor {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 0;
      height: 0;
    }

    .sim-layer {
      position: absolute;
      left: 0;
      top: 0;
      transform-origin: center center;
      will-change: transform, opacity, filter;
      user-select: none;
      -webkit-user-drag: none;
    }

    .sim-main { z-index: 1; }

    .sim-fx {
      z-index: 2;
      mix-blend-mode: screen;
    }

    .sim-fx-hot {
      z-index: 3;
      pointer-events: none;
      mix-blend-mode: screen;
      opacity: 0;
    }

    .controls {
      padding: 14px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      display: grid;
      gap: 12px;
      align-content: start;
      max-height: calc(64vh + 20px);
      overflow: auto;
    }

    .controls h3 {
      margin: 0;
      font-size: 14px;
    }

    .subsection {
      display: grid;
      gap: 10px;
      padding-top: 10px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }

    .subsection:first-of-type {
      padding-top: 0;
      border-top: 0;
    }

    .row-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .export-box {
      width: 100%;
      min-height: 180px;
      resize: vertical;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(0, 0, 0, 0.22);
      color: var(--text);
      padding: 10px 12px;
      font: 12px/1.5 Consolas, monospace;
    }

    .control {
      display: grid;
      gap: 6px;
    }

    .control label {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      font-size: 12px;
      color: var(--muted);
    }

    .control output {
      color: var(--accent);
      font-family: Consolas, monospace;
    }

    .notes {
      padding: 0 18px 18px;
    }

    @media (max-width: 1200px) {
      .compare { grid-template-columns: 1fr; }
      .controls { max-height: none; }
    }

    @media (max-width: 960px) {
      .stages { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="panel toolbar">
      <div class="meta">
        <strong>CF 双杀对比调试</strong>
        <span>左边是 sample，右边是双图模拟版。当前方案是原始特效图 + 同形状高光替身层。</span>
      </div>
      <div class="actions">
        <button class="primary" id="playBothBtn" type="button">两边一起重播</button>
        <button class="ghost" id="prevFrameBtn" type="button">上一帧</button>
        <button class="ghost" id="togglePlayBtn" type="button">暂停</button>
        <button class="ghost" id="nextFrameBtn" type="button">下一帧</button>
        <span id="frameInfo">帧 0 / 76</span>
        <button class="ghost" id="autoBtn" type="button">自动循环: 开</button>
        <label class="speed" for="speedRange">
          倍速
          <input id="speedRange" type="range" min="0.25" max="2" step="0.05" value="1">
          <span id="speedValue">1.00x</span>
        </label>
      </div>
    </section>

    <section class="panel compare">
      <div class="stages">
        <section class="stage-card">
          <div class="stage-title">Sample 最终效果</div>
          <div class="stage-desc">直接播放 `sample/2killre` 序列帧，作为目标参考。</div>
          <div class="stage">
            <div class="crosshair"></div>
            <div class="canvas-wrap">
              <canvas id="sampleCanvas" width="607" height="436"></canvas>
            </div>
          </div>
        </section>

        <section class="stage-card">
          <div class="stage-title">双图模拟版</div>
          <div class="stage-desc">`badge_multi2.PNG` + `multi2_fx.PNG`，另加同形状高光替身层。</div>
          <div class="stage" id="simStage">
            <div class="crosshair"></div>
            <div class="sim-wrap">
              <div class="sim-anchor">
                <img id="simMain" class="sim-layer sim-main" src="./badge_multi2.PNG" alt="main">
                <img id="simFx1" class="sim-layer sim-fx" src="./multi2_fx.PNG" alt="fx">
                <img id="simFx2" class="sim-layer sim-fx" src="./multi2_fx.PNG" alt="fx">
                <img id="simFx3" class="sim-layer sim-fx" src="./multi2_fx.PNG" alt="fx">
                <img id="simFx4" class="sim-layer sim-fx" src="./multi2_fx.PNG" alt="fx">
                <img id="simFx5" class="sim-layer sim-fx" src="./multi2_fx.PNG" alt="fx">
              </div>
            </div>
          </div>
        </section>
      </div>

      <aside class="controls" id="controls"></aside>
    </section>

    <section class="panel notes">
      参考动画来自 `sample/2killre`，规格是 <code>607x436</code>、<code>77 帧</code>、<code>60fps</code>。
      当前测试重点是让 `multi2_fx.PNG` 先被高光替身层整体替换，再逐渐回归原图。
    </section>
  </main>

  <script>
    const sampleCanvas = document.getElementById("sampleCanvas");
    const sampleCtx = sampleCanvas.getContext("2d");
    const simMain = document.getElementById("simMain");
    const simFxLayers = Array.from(document.querySelectorAll(".sim-fx"));
    const controls = document.getElementById("controls");
    const playBothBtn = document.getElementById("playBothBtn");
    const prevFrameBtn = document.getElementById("prevFrameBtn");
    const togglePlayBtn = document.getElementById("togglePlayBtn");
    const nextFrameBtn = document.getElementById("nextFrameBtn");
    const frameInfo = document.getElementById("frameInfo");
    const autoBtn = document.getElementById("autoBtn");
    const speedRange = document.getElementById("speedRange");
    const speedValue = document.getElementById("speedValue");

    const sampleConfig = {
      frame_width: 607,
      frame_height: 436,
      frames: 77,
      fps: 60,
      sheets: [
        { file: "2killre_00.png", start_frame: 0, frames: 54, cols: 6, rows: 9 },
        { file: "2killre_01.png", start_frame: 54, frames: 23, cols: 6, rows: 4 }
      ]
    };

    let animData = null;
    let frameIndex = 0;
    let playing = false;
    let autoLoop = true;
    let speed = 1;
    let lastTime = 0;
    let frameCarry = 0;
    const frameOverrides = {
      0: {
        mainDY: 160,
        mainScaleMul: 0.94
      },
      1: {
        mainScaleMul: 0.78
      },
      2: {
        mainDX: 48,
        mainDY: 83,
        mainScaleMul: 0.69
      },
      3: {
        mainDY: 28,
        mainScaleMul: 0.55
      },
      4: {
        mainScaleMul: 0.55
      },
      5: {
        mainDX: 6,
        mainDY: 38,
        mainScaleMul: 0.63
      },
      6: {
        mainDX: 25,
        mainDY: 28,
        mainScaleMul: 0.69
      },
      7: {
        mainDX: 23,
        mainDY: 33,
        mainScaleMul: 0.77
      },
      8: {
        mainDX: -20,
        mainDY: 20,
        mainScaleMul: 0.87
      },
      9: {
        mainDX: 6,
        mainDY: 29,
        mainScaleMul: 0.93
      },
      10: {
        mainDX: -6,
        mainDY: 25
      },
      11: {
        mainDX: -18,
        mainDY: 20
      }
    };
    let frameEditorInputs = {};

    const simState = {
      mainWidth: 360,
      mainHeight: 360,
      mainOffsetX: -180,
      mainOffsetY: -180,
      mainStartX: -79,
      mainStartY: 118,
      mainMid1X: -180,
      mainMid1Y: -180,
      mainMid2X: -180,
      mainMid2Y: -180,
      mainScaleStart: 4.80,
      mainScaleMid1: 2.55,
      mainScaleMid2: 2.10,
      mainDuration: 1.2833,
      mainFadeMid: 0.55,
      mainScaleEnd: 1.00,
      fxWidth: 220,
      fxHeight: 220,
      fxOffsetX: -110,
      fxOffsetY: -110,
      fxScaleStart: 4.55,
      fxScalePeak: 2.05,
      fxScaleEnd: 1.12,
      fxOpacityPeak: 1.00,
      fxDuration: 0.48,
      fxBlur: 0.06,
      fxFillBoost: 1.28
    };

    const controlDefs = [
      ["mainWidth", "Main Width", 80, 260, 1],
      ["mainHeight", "Main Height", 80, 260, 1],
      ["mainOffsetX", "Main X", -180, 40, 1],
      ["mainOffsetY", "Main Y", -180, 40, 1],
      ["mainStartY", "Main Start Y", -40, 220, 1],
      ["mainMid1Y", "Main Mid1 Y", -80, 160, 1],
      ["mainMid2Y", "Main Mid2 Y", -120, 120, 1],
      ["mainScaleStart", "Main Start Scale", 0.10, 6.50, 0.01],
      ["mainScaleMid1", "Main Mid1 Scale", 0.50, 4.00, 0.01],
      ["mainScaleMid2", "Main Mid2 Scale", 0.50, 2.00, 0.01],
      ["mainDuration", "Main Duration", 0.20, 1.60, 0.01],
      ["mainFadeMid", "Main Fade Mid", 0.10, 1.00, 0.01],
      ["mainScaleEnd", "Main End Scale", 0.80, 1.40, 0.01],
      ["fxWidth", "FX Width", 40, 220, 1],
      ["fxHeight", "FX Height", 40, 220, 1],
      ["fxOffsetX", "FX X", -180, 40, 1],
      ["fxOffsetY", "FX Y", -180, 40, 1],
      ["fxScaleStart", "FX Start Scale", 0.10, 6.50, 0.01],
      ["fxScalePeak", "FX Peak Scale", 0.50, 2.20, 0.01],
      ["fxScaleEnd", "FX End Scale", 0.50, 1.80, 0.01],
      ["fxOpacityPeak", "FX Peak Alpha", 0.10, 1.00, 0.01],
      ["fxDuration", "FX Duration", 0.10, 1.20, 0.01],
      ["fxBlur", "FX Blur", 0.00, 4.00, 0.01],
      ["fxFillBoost", "FX Fill Boost", 0.80, 1.80, 0.01]
    ];

    const frameEditorDefs = [
      ["mainDX", "Main DX", -160, 160, 1],
      ["mainDY", "Main DY", -160, 160, 1],
      ["mainScaleMul", "Main Scale x", 0.20, 3.00, 0.01],
      ["mainOpacityMul", "Main Alpha x", 0.00, 2.00, 0.01],
      ["fxDX", "FX DX", -160, 160, 1],
      ["fxDY", "FX DY", -160, 160, 1],
      ["fxScaleMul", "FX Scale x", 0.20, 3.00, 0.01],
      ["fxOpacityMul", "FX Alpha x", 0.00, 2.00, 0.01],
      ["fxBlurAdd", "FX Blur +", -2.00, 4.00, 0.01]
    ];

    const frameEditorDefaults = {
      mainDX: 0,
      mainDY: 0,
      mainScaleMul: 1,
      mainOpacityMul: 1,
      fxDX: 0,
      fxDY: 0,
      fxScaleMul: 1,
      fxOpacityMul: 1,
      fxBlurAdd: 0
    };

    function updateSpeedLabel() {
      speedValue.textContent = `${speed.toFixed(2)}x`;
    }

    function updatePlayLabel() {
      togglePlayBtn.textContent = playing ? "暂停" : "播放";
    }

    function updateFrameInfo() {
      if (!animData) {
        frameInfo.textContent = "帧 0 / 0";
        return;
      }
      frameInfo.textContent = `帧 ${frameIndex} / ${animData.frames - 1}`;
    }

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    function sampleTrack(keys, progress) {
      if (progress <= keys[0].p) return keys[0];
      for (let i = 1; i < keys.length; i += 1) {
        const prev = keys[i - 1];
        const next = keys[i];
        if (progress <= next.p) {
          const local = (progress - prev.p) / (next.p - prev.p || 1);
          return {
            x: lerp(prev.x, next.x, local),
            y: lerp(prev.y, next.y, local),
            scale: lerp(prev.scale, next.scale, local),
            opacity: lerp(prev.opacity, next.opacity, local)
          };
        }
      }
      return keys[keys.length - 1];
    }

    function getFrameOverride(frame) {
      if (!frameOverrides[frame]) {
        frameOverrides[frame] = { ...frameEditorDefaults };
      } else {
        frameOverrides[frame] = {
          ...frameEditorDefaults,
          ...frameOverrides[frame]
        };
      }
      return frameOverrides[frame];
    }

    function refreshFrameEditor() {
      const patch = getFrameOverride(frameIndex);
      for (const [key, refs] of Object.entries(frameEditorInputs)) {
        if (key === "__title") continue;
        refs.input.value = patch[key];
        refs.output.value = refs.step < 1 ? Number(patch[key]).toFixed(2) : patch[key];
      }
      if (frameEditorInputs.__title) {
        frameEditorInputs.__title.textContent = `逐帧手调 - 当前帧 ${frameIndex}`;
      }
    }

    function renderSimFrame(frame) {
      if (!animData) return;

      const timeSec = frame / animData.fps;
      const mainProgress = Math.max(0, Math.min(1, timeSec / simState.mainDuration));
      const fxProgress = Math.max(0, Math.min(1, timeSec / simState.fxDuration));

      const mainKeys = [
        { p: 0.00, x: simState.mainOffsetX, y: 96, scale: simState.mainScaleStart, opacity: 1.00 },
        { p: 0.0222, x: simState.mainMid1X, y: simState.mainMid1Y, scale: 2.75, opacity: 1.00 },
        { p: 0.0444, x: simState.mainOffsetX + 16, y: simState.mainOffsetY - 16, scale: 2.28, opacity: 1.00 },
        { p: 0.0667, x: simState.mainOffsetX + 21, y: simState.mainOffsetY - 22, scale: 2.02, opacity: 1.00 },
        { p: 0.0889, x: simState.mainOffsetX + 13, y: simState.mainOffsetY - 14, scale: 1.80, opacity: 1.00 },
        { p: 0.1111, x: simState.mainOffsetX + 18, y: simState.mainOffsetY - 18, scale: 1.62, opacity: 1.00 },
        { p: 0.1333, x: simState.mainOffsetX + 10, y: simState.mainOffsetY - 11, scale: 1.46, opacity: 1.00 },
        { p: 0.1556, x: simState.mainOffsetX + 14, y: simState.mainOffsetY - 14, scale: 1.32, opacity: 1.00 },
        { p: 0.1778, x: simState.mainOffsetX + 8, y: simState.mainOffsetY - 8, scale: 1.22, opacity: 1.00 },
        { p: 0.2000, x: simState.mainOffsetX + 11, y: simState.mainOffsetY - 10, scale: 1.15, opacity: 1.00 },
        { p: 0.2222, x: simState.mainOffsetX + 6, y: simState.mainOffsetY - 6, scale: 1.10, opacity: 1.00 },
        { p: 0.2444, x: simState.mainOffsetX + 8, y: simState.mainOffsetY - 7, scale: 1.06, opacity: 1.00 },
        { p: 0.2667, x: simState.mainOffsetX + 4, y: simState.mainOffsetY - 4, scale: 1.03, opacity: 1.00 },
        { p: 0.2889, x: simState.mainOffsetX + 5, y: simState.mainOffsetY - 4, scale: 1.01, opacity: 1.00 },
        { p: 0.3111, x: simState.mainOffsetX + 1, y: simState.mainOffsetY - 1, scale: 1.00, opacity: 1.00 },
        { p: 0.35, x: simState.mainOffsetX, y: simState.mainOffsetY, scale: 1.00, opacity: 1.00 },
        { p: 0.7143, x: simState.mainOffsetX, y: simState.mainOffsetY, scale: 1.00, opacity: 1.00 },
        { p: 0.8571, x: simState.mainOffsetX, y: simState.mainOffsetY, scale: 1.00, opacity: simState.mainFadeMid },
        { p: 1.00, x: simState.mainOffsetX, y: simState.mainOffsetY, scale: simState.mainScaleEnd, opacity: 0.00 }
      ];

      const fxKeys = [
        { p: 0.00, scale: simState.fxScaleStart, opacity: simState.fxOpacityPeak * 0.94 },
        { p: 0.0222, scale: 2.95, opacity: simState.fxOpacityPeak },
        { p: 0.0444, scale: 2.62, opacity: simState.fxOpacityPeak },
        { p: 0.0667, scale: 2.42, opacity: simState.fxOpacityPeak },
        { p: 0.0889, scale: 2.08, opacity: simState.fxOpacityPeak * 0.98 },
        { p: 0.1111, scale: 1.94, opacity: simState.fxOpacityPeak * 0.96 },
        { p: 0.1333, scale: 1.66, opacity: simState.fxOpacityPeak * 0.92 },
        { p: 0.1556, scale: 1.56, opacity: simState.fxOpacityPeak * 0.88 },
        { p: 0.1778, scale: 1.32, opacity: simState.fxOpacityPeak * 0.82 },
        { p: 0.2000, scale: 1.28, opacity: simState.fxOpacityPeak * 0.78 },
        { p: 0.2222, scale: 1.12, opacity: simState.fxOpacityPeak * 0.74 },
        { p: 0.2444, scale: 1.12, opacity: simState.fxOpacityPeak * 0.70 },
        { p: 0.2667, scale: 1.04, opacity: simState.fxOpacityPeak * 0.68 },
        { p: 0.2889, scale: 1.00, opacity: simState.fxOpacityPeak * 0.66 },
        { p: 0.35, scale: 1.00, opacity: simState.fxOpacityPeak * 0.66 },
        { p: 0.70, scale: 1.00, opacity: simState.fxOpacityPeak * 0.62 },
        { p: 0.86, scale: 1.00, opacity: simState.fxOpacityPeak * 0.24 },
        { p: 1.00, scale: simState.fxScaleEnd, opacity: 0.00 }
      ];

      const main = sampleTrack(mainKeys, mainProgress);
      const fxTrack = sampleTrack(fxKeys.map((key) => ({ ...key, x: 0, y: 0 })), fxProgress);

      const fillWindow = Math.max(0, 1 - Math.abs(fxProgress - 0.24) / 0.14);
      const fillBoost = 1 + (simState.fxFillBoost - 1) * fillWindow;
      const framePatch = getFrameOverride(frame);

      main.x += framePatch.mainDX;
      main.y += framePatch.mainDY;
      main.scale *= framePatch.mainScaleMul;
      main.opacity *= framePatch.mainOpacityMul;

      const fx = {
        x: main.x + (simState.fxOffsetX - simState.mainOffsetX),
        y: main.y + (simState.fxOffsetY - simState.mainOffsetY),
        scale: fxTrack.scale * fillBoost,
        opacity: fxTrack.opacity
      };

      fx.x += framePatch.fxDX;
      fx.y += framePatch.fxDY;
      fx.scale *= framePatch.fxScaleMul;
      fx.opacity *= framePatch.fxOpacityMul;
      const fxBlurValue = Math.max(0, simState.fxBlur + fillWindow * 0.40 + framePatch.fxBlurAdd);

      if (frame >= 5 && frame <= 15) {
        main.scale = 1.0;
      }

      if (frame >= 16) {
        main.x = simState.mainOffsetX;
        main.y = simState.mainOffsetY;
        main.scale = 1.0;
        fx.x = main.x + (simState.fxOffsetX - simState.mainOffsetX);
        fx.y = main.y + (simState.fxOffsetY - simState.mainOffsetY);
        fx.scale = 1.0;
      }

      let fxStackScale = 1.0;
      let fxVisibleLayers = 3;
      let extraLayerAlpha = [1, 1];
      let fxOpacityMultiplier = 1.0;
      let fxOpacityFloor = null;

      if (frame >= 0 && frame <= 15) {
        const growT = Math.max(0, Math.min(1, frame / 15));
        fxVisibleLayers = frame <= 6 ? 3 : 5;
        fxStackScale = 1.00 + (1.30 - 1.00) * growT;
        if (frame >= 7) {
          extraLayerAlpha = [0.92, 0.78];
        } else {
          extraLayerAlpha = [0, 0];
        }
      } else if (frame >= 16) {
        if (frame <= 35) {
          const settleT = Math.max(0, Math.min(1, (frame - 16) / 19));
          fxVisibleLayers = 5;
          fxStackScale = 1.30 + (1.0 - 1.30) * settleT;
          extraLayerAlpha = [
            Math.max(0, 0.92 * (1 - settleT)),
            Math.max(0, 0.78 * (1 - settleT))
          ];
          fxOpacityMultiplier = 1.0;
          fx.opacity = simState.fxOpacityPeak * 0.66;
          fxOpacityFloor = simState.fxOpacityPeak * 0.66;
        } else {
          const fadeT = Math.max(0, Math.min(1, (frame - 35) / 20));
          fxVisibleLayers = 3;
          fxStackScale = 1.0;
          extraLayerAlpha = [0, 0];
          fx.opacity = simState.fxOpacityPeak * 0.66;
          fxOpacityMultiplier = 1.0 - fadeT;
          fxOpacityFloor = simState.fxOpacityPeak * 0.66 * (1.0 - fadeT);
        }
      }

      const effectiveFxOpacity = fxOpacityFloor == null
        ? fx.opacity
        : Math.max(fx.opacity, fxOpacityFloor);

      simMain.style.opacity = main.opacity;
      simMain.style.transform = `translate(${main.x}px, ${main.y}px) scale(${main.scale})`;

      const layerOpacityMultipliers = [1, 1, 1, extraLayerAlpha[0], extraLayerAlpha[1]];
      for (let i = 0; i < simFxLayers.length; i += 1) {
        const simFx = simFxLayers[i];
        const visible = i < fxVisibleLayers;
        const opacityMul = layerOpacityMultipliers[i] ?? 1;
        simFx.style.opacity = visible ? effectiveFxOpacity * opacityMul * fxOpacityMultiplier : 0;
        simFx.style.transform = `translate(${fx.x}px, ${fx.y}px) scale(${fx.scale * fxStackScale})`;
        simFx.style.filter = `blur(${fxBlurValue}px)`;
      }
    }

    function clearCanvas() {
      sampleCtx.clearRect(0, 0, sampleCanvas.width, sampleCanvas.height);
    }

    function findSheet(frame) {
      if (!animData) return null;
      for (const sheet of animData.sheets) {
        const endFrame = sheet.start_frame + sheet.frames;
        if (frame >= sheet.start_frame && frame < endFrame) return sheet;
      }
      return null;
    }

    function drawSampleFrame(frame) {
      if (!animData) return;
      clearCanvas();
      const sheet = findSheet(frame);
      if (!sheet) return;

      const localFrame = frame - sheet.start_frame;
      const col = localFrame % sheet.cols;
      const row = Math.floor(localFrame / sheet.cols);
      const sx = col * animData.frame_width;
      const sy = row * animData.frame_height;

      sampleCtx.drawImage(
        sheet.image,
        sx,
        sy,
        animData.frame_width,
        animData.frame_height,
        0,
        0,
        animData.frame_width,
        animData.frame_height
      );
    }

    function applySimState() {
      simMain.style.width = `${simState.mainWidth}px`;
      simMain.style.height = `${simState.mainHeight}px`;
      simMain.style.transform = `translate(${simState.mainOffsetX}px, ${simState.mainOffsetY}px)`;

      for (const simFx of simFxLayers) {
        simFx.style.width = `${simState.fxWidth}px`;
        simFx.style.height = `${simState.fxHeight}px`;
        simFx.style.transform = `translate(${simState.fxOffsetX}px, ${simState.fxOffsetY}px)`;
      }
    }

    function seekFrame(targetFrame) {
      if (!animData) return;
      frameIndex = Math.max(0, Math.min(animData.frames - 1, targetFrame));
      drawSampleFrame(frameIndex);
      renderSimFrame(frameIndex);
      updateFrameInfo();
      refreshFrameEditor();
    }

    function restartBoth() {
      if (!animData) return;
      frameCarry = 0;
      lastTime = 0;
      playing = true;
      seekFrame(0);
      updatePlayLabel();
    }

    function tick(timestamp) {
      if (!playing || !animData) {
        requestAnimationFrame(tick);
        return;
      }

      if (!lastTime) {
        lastTime = timestamp;
        requestAnimationFrame(tick);
        return;
      }

      const delta = timestamp - lastTime;
      lastTime = timestamp;
      frameCarry += (delta / 1000) * animData.fps * speed;

      while (frameCarry >= 1) {
        frameCarry -= 1;
        frameIndex += 1;
        if (frameIndex >= animData.frames) {
          if (autoLoop) {
            frameIndex = 0;
          } else {
            frameIndex = animData.frames - 1;
            playing = false;
            updatePlayLabel();
            break;
          }
        }
      }

      drawSampleFrame(frameIndex);
      renderSimFrame(frameIndex);
      updateFrameInfo();
      refreshFrameEditor();
      requestAnimationFrame(tick);
    }

    function makeControl(key, labelText, min, max, step) {
      const wrap = document.createElement("div");
      wrap.className = "control";

      const label = document.createElement("label");
      label.textContent = labelText;

      const output = document.createElement("output");
      output.value = step < 1 ? Number(simState[key]).toFixed(2) : simState[key];
      label.appendChild(output);

      const input = document.createElement("input");
      input.type = "range";
      input.min = min;
      input.max = max;
      input.step = step;
      input.value = simState[key];

      input.addEventListener("input", () => {
        simState[key] = Number(input.value);
        output.value = step < 1 ? simState[key].toFixed(2) : simState[key];
        applySimState();
        renderSimFrame(frameIndex);
      });

      wrap.appendChild(label);
      wrap.appendChild(input);
      controls.appendChild(wrap);
    }

    function buildControls() {
      controls.innerHTML = "";
      const title = document.createElement("h3");
      title.textContent = "模拟版参数";
      controls.appendChild(title);
      for (const def of controlDefs) {
        makeControl(...def);
      }
    }

    function buildAdvancedControls() {
      controls.innerHTML = "";
      frameEditorInputs = {};

      const frameSection = document.createElement("div");
      frameSection.className = "subsection";

      const frameTitle = document.createElement("h3");
      frameTitle.textContent = `逐帧手调 - 当前帧 ${frameIndex}`;
      frameSection.appendChild(frameTitle);
      frameEditorInputs.__title = frameTitle;

      for (const [key, labelText, min, max, step] of frameEditorDefs) {
        const wrap = document.createElement("div");
        wrap.className = "control";

        const label = document.createElement("label");
        label.textContent = labelText;

        const output = document.createElement("output");
        label.appendChild(output);

        const input = document.createElement("input");
        input.type = "range";
        input.min = min;
        input.max = max;
        input.step = step;

        input.addEventListener("input", () => {
          const patch = getFrameOverride(frameIndex);
          patch[key] = Number(input.value);
          output.value = step < 1 ? patch[key].toFixed(2) : patch[key];
          renderSimFrame(frameIndex);
        });

        frameEditorInputs[key] = { input, output, step };
        wrap.appendChild(label);
        wrap.appendChild(input);
        frameSection.appendChild(wrap);
      }

      const frameActions = document.createElement("div");
      frameActions.className = "row-actions";

      const resetCurrentBtn = document.createElement("button");
      resetCurrentBtn.className = "ghost";
      resetCurrentBtn.type = "button";
      resetCurrentBtn.textContent = "重置当前帧";
      resetCurrentBtn.addEventListener("click", () => {
        frameOverrides[frameIndex] = { ...frameEditorDefaults };
        refreshFrameEditor();
        renderSimFrame(frameIndex);
      });

      const clonePrevBtn = document.createElement("button");
      clonePrevBtn.className = "ghost";
      clonePrevBtn.type = "button";
      clonePrevBtn.textContent = "复制上一帧";
      clonePrevBtn.addEventListener("click", () => {
        frameOverrides[frameIndex] = { ...getFrameOverride(Math.max(0, frameIndex - 1)) };
        refreshFrameEditor();
        renderSimFrame(frameIndex);
      });

      const exportBtn = document.createElement("button");
      exportBtn.className = "primary";
      exportBtn.type = "button";
      exportBtn.textContent = "导出逐帧参数";

      const exportBox = document.createElement("textarea");
      exportBox.className = "export-box";
      exportBox.readOnly = true;
      exportBox.placeholder = "导出的 JSON 会显示在这里";

      exportBtn.addEventListener("click", async () => {
        const compact = {};
        for (const [frame, patch] of Object.entries(frameOverrides)) {
          const reduced = {};
          for (const [key, defaultValue] of Object.entries(frameEditorDefaults)) {
            if (patch[key] !== defaultValue) reduced[key] = patch[key];
          }
          if (Object.keys(reduced).length) compact[frame] = reduced;
        }
        const payload = {
          frame_count: animData?.frames ?? sampleConfig.frames,
          fps: animData?.fps ?? sampleConfig.fps,
          overrides: compact
        };
        const text = JSON.stringify(payload, null, 2);
        exportBox.value = text;
        try {
          await navigator.clipboard.writeText(text);
        } catch {}
      });

      frameActions.appendChild(resetCurrentBtn);
      frameActions.appendChild(clonePrevBtn);
      frameActions.appendChild(exportBtn);
      frameSection.appendChild(frameActions);
      frameSection.appendChild(exportBox);
      controls.appendChild(frameSection);

      const globalSection = document.createElement("div");
      globalSection.className = "subsection";
      const title = document.createElement("h3");
      title.textContent = "全局参数";
      globalSection.appendChild(title);
      controls.appendChild(globalSection);

      for (const def of controlDefs) {
        makeControl(...def);
        globalSection.appendChild(controls.lastElementChild);
      }

      refreshFrameEditor();
    }

    async function loadSample() {
      animData = structuredClone(sampleConfig);
      const sheets = await Promise.all(
        animData.sheets.map((sheet) => new Promise((resolve, reject) => {
          const image = new Image();
          image.onload = () => resolve({ ...sheet, image });
          image.onerror = reject;
          image.src = `./sample/${sheet.file}`;
        }))
      );
      animData.sheets = sheets;
      restartBoth();
      updateFrameInfo();
      requestAnimationFrame(tick);
    }

    playBothBtn.addEventListener("click", restartBoth);

    prevFrameBtn.addEventListener("click", () => {
      playing = false;
      frameCarry = 0;
      updatePlayLabel();
      seekFrame(frameIndex - 1);
    });

    nextFrameBtn.addEventListener("click", () => {
      playing = false;
      frameCarry = 0;
      updatePlayLabel();
      seekFrame(frameIndex + 1);
    });

    togglePlayBtn.addEventListener("click", () => {
      playing = !playing;
      frameCarry = 0;
      lastTime = 0;
      renderSimFrame(frameIndex);
      updatePlayLabel();
    });

    autoBtn.addEventListener("click", () => {
      autoLoop = !autoLoop;
      autoBtn.textContent = autoLoop ? "自动循环: 开" : "自动循环: 关";
      if (autoLoop && !playing) restartBoth();
    });

    speedRange.addEventListener("input", () => {
      speed = Number(speedRange.value);
      updateSpeedLabel();
    });

    buildAdvancedControls();
    applySimState();
    updateSpeedLabel();
    updatePlayLabel();
    loadSample().catch((error) => {
      console.error("Sample animation load failed:", error);
    });
  </script>
</body>
</html>
